name: build-windows

on:
  workflow_dispatch:
  # Tag releases are handled by .github/workflows/release.yml

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.9.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.9.13"

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[build]"

      - name: Build (PyInstaller)
        shell: pwsh
        run: |
          $out = "build/pyinstaller/windows"
          New-Item -ItemType Directory -Force -Path "$out/dist" | Out-Null
          New-Item -ItemType Directory -Force -Path "$out/work" | Out-Null
          New-Item -ItemType Directory -Force -Path "$out/spec" | Out-Null
          pyinstaller --clean --noconfirm `
            --name nps-lens `
            --onefile `
            --distpath "$out/dist" `
            --workpath "$out/work" `
            --specpath "$out/spec" `
            -m nps_lens.cli

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: nps-lens-windows
          path: build/pyinstaller/windows/dist/nps-lens.exe
