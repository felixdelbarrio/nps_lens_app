name: build-windows

on:
  workflow_dispatch:
  # Tag releases are handled by .github/workflows/release.yml

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.9.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.9.13"

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[build]"

      - name: Runtime smoke-check (PPT/export)
        shell: pwsh
        run: |
          python scripts/verify_runtime.py

      - name: Prepare icons
        shell: pwsh
        run: |
          python scripts/prepare_icons.py --input assets/logo.png --out-dir build/icons

      - name: Build (PyInstaller)
        shell: pwsh
        run: |
          $out = "build/pyinstaller/windows"
          New-Item -ItemType Directory -Force -Path "$out/dist" | Out-Null
          New-Item -ItemType Directory -Force -Path "$out/work" | Out-Null
          New-Item -ItemType Directory -Force -Path "$out/spec" | Out-Null
          pyinstaller --clean --noconfirm `
            --name nps-lens `
            --windowed `
            --icon build/icons/app.ico `
            --add-data="$PWD/app;app" `
            --add-data="$PWD/assets;assets" `
            --add-data="$PWD/.streamlit;.streamlit" `
            --collect-submodules nps_lens `
            --collect-submodules webview `
            --collect-all kaleido `
            --collect-all dotenv `
            --collect-all streamlit `
            --copy-metadata python-dotenv `
            --copy-metadata streamlit `
            --collect-data pptx `
            --distpath "$out/dist" `
            --workpath "$out/work" `
            --specpath "$out/spec" `
            src/nps_lens/desktop.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: nps-lens-windows
          path: build/pyinstaller/windows/dist/nps-lens
