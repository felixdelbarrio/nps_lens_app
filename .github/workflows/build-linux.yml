name: build-linux

on:
  workflow_dispatch:
  # Tag releases are handled by .github/workflows/release.yml

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.9.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.9.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[build]"

      - name: Runtime smoke-check (PPT/export)
        run: |
          python scripts/verify_runtime.py

      - name: Prepare icons
        run: |
          python scripts/prepare_icons.py --input assets/logo.png --out-dir build/icons

      - name: Build (PyInstaller)
        run: |
          out=build/pyinstaller/linux
          mkdir -p "$out/dist" "$out/work" "$out/spec"
          pyinstaller --clean --noconfirm \
            --name nps-lens \
            --onefile \
            --icon build/icons/app.png \
            --add-data="$PWD/app:app" \
            --add-data="$PWD/assets:assets" \
            --add-data="$PWD/.streamlit:.streamlit" \
            --collect-submodules webview \
            --collect-all kaleido \
            --collect-data pptx \
            --distpath "$out/dist" \
            --workpath "$out/work" \
            --specpath "$out/spec" \
            src/nps_lens/desktop.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: nps-lens-linux
          path: build/pyinstaller/linux/dist/nps-lens
