name: release

on:
  push:
    branches: ["master"]

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    name: quality
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.9.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.9.13"
          cache: "pip"

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        shell: bash
        run: |
          make python-dev
          npm --prefix frontend ci

      - name: Lint
        shell: bash
        run: make lint

      - name: Typecheck
        shell: bash
        run: make typecheck

      - name: Test
        shell: bash
        run: make test

      - name: CI frontend and E2E
        shell: bash
        run: make ci

  build:
    name: build-${{ matrix.label }}
    needs: quality
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: linux
            runner: ubuntu-latest
            artifact_name: nps-lens-linux
            artifact_path: build/pyinstaller/linux/nps-lens-linux.tar.gz
          - label: macos
            runner: macos-15-intel
            artifact_name: nps-lens-macos
            artifact_path: build/pyinstaller/macos/nps-lens-macos.zip
          - label: windows
            runner: windows-latest
            artifact_name: nps-lens-windows
            artifact_path: build/pyinstaller/windows/nps-lens-windows.zip

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.9.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.9.13"
          cache: "pip"

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install Linux system libraries for pywebview packaging
        if: matrix.label == 'linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-0 libwebkit2gtk-4.1-0

      - name: Install dependencies
        shell: bash
        run: |
          make python-build
          npm --prefix frontend ci

      - name: Build native desktop application
        shell: bash
        run: make build

      - name: Verify Linux build output
        if: matrix.label == 'linux'
        shell: bash
        run: test -f build/pyinstaller/linux/dist/nps-lens

      - name: Verify macOS build output
        if: matrix.label == 'macos'
        shell: bash
        run: test -d build/pyinstaller/macos/dist/nps-lens.app

      - name: Verify Windows build output
        if: matrix.label == 'windows'
        shell: pwsh
        run: |
          $exe = Join-Path $env:GITHUB_WORKSPACE "build/pyinstaller/windows/dist/nps-lens.exe"
          if (!(Test-Path -LiteralPath $exe -PathType Leaf)) {
            Get-ChildItem -LiteralPath (Join-Path $env:GITHUB_WORKSPACE "build/pyinstaller/windows/dist") -Recurse -ErrorAction SilentlyContinue
            throw "Missing Windows build output: $exe"
          }

      - name: Archive Linux build output
        if: matrix.label == 'linux'
        shell: bash
        run: |
          tar -czf build/pyinstaller/linux/nps-lens-linux.tar.gz \
            -C build/pyinstaller/linux/dist nps-lens

      - name: Archive macOS build output
        if: matrix.label == 'macos'
        shell: bash
        run: |
          ditto -c -k --sequesterRsrc --keepParent \
            build/pyinstaller/macos/dist/nps-lens.app \
            build/pyinstaller/macos/nps-lens-macos.zip

      - name: Archive Windows build output
        if: matrix.label == 'windows'
        shell: pwsh
        run: |
          $exe = Join-Path $env:GITHUB_WORKSPACE "build/pyinstaller/windows/dist/nps-lens.exe"
          $zip = Join-Path $env:GITHUB_WORKSPACE "build/pyinstaller/windows/nps-lens-windows.zip"
          Compress-Archive `
            -Path $exe `
            -DestinationPath $zip `
            -Force

      - name: Verify packaged artifact
        shell: bash
        run: test -f "${{ matrix.artifact_path }}"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error

      - name: Upload Windows executable artifact
        if: matrix.label == 'windows'
        uses: actions/upload-artifact@v4
        with:
          name: nps-lens-windows-exe
          path: build/pyinstaller/windows/dist/nps-lens.exe
          if-no-files-found: error

  publish:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist-artifacts

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist-artifacts/nps-lens-linux/nps-lens-linux.tar.gz
            dist-artifacts/nps-lens-macos/nps-lens-macos.zip
            dist-artifacts/nps-lens-windows/nps-lens-windows.zip
