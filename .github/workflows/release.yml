name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.9.13"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[build]"
      - name: Build
        run: |
          out=build/pyinstaller/linux
          mkdir -p "$out/dist" "$out/work" "$out/spec"
          pyinstaller --clean --noconfirm \
            --name nps-lens \
            --onefile \
            --distpath "$out/dist" \
            --workpath "$out/work" \
            --specpath "$out/spec" \
            -m nps_lens.cli
      - uses: actions/upload-artifact@v4
        with:
          name: bin-linux
          path: build/pyinstaller/linux/dist/nps-lens

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.9.13"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[build]"
      - name: Build
        run: |
          out=build/pyinstaller/macos
          mkdir -p "$out/dist" "$out/work" "$out/spec"
          pyinstaller --clean --noconfirm \
            --name nps-lens \
            --onefile \
            --distpath "$out/dist" \
            --workpath "$out/work" \
            --specpath "$out/spec" \
            -m nps_lens.cli
      - uses: actions/upload-artifact@v4
        with:
          name: bin-macos
          path: build/pyinstaller/macos/dist/nps-lens

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.9.13"
      - name: Install
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[build]"
      - name: Build
        shell: pwsh
        run: |
          $out = "build/pyinstaller/windows"
          New-Item -ItemType Directory -Force -Path "$out/dist" | Out-Null
          New-Item -ItemType Directory -Force -Path "$out/work" | Out-Null
          New-Item -ItemType Directory -Force -Path "$out/spec" | Out-Null
          pyinstaller --clean --noconfirm `
            --name nps-lens `
            --onefile `
            --distpath "$out/dist" `
            --workpath "$out/work" `
            --specpath "$out/spec" `
            -m nps_lens.cli
      - uses: actions/upload-artifact@v4
        with:
          name: bin-windows
          path: build/pyinstaller/windows/dist/nps-lens.exe

  publish:
    needs: [build-linux, build-macos, build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Prepare asset names
        run: |
          tag="${GITHUB_REF_NAME}"
          mkdir -p out
          cp release-assets/bin-linux/nps-lens "out/nps-lens-${tag}-linux"
          cp release-assets/bin-macos/nps-lens "out/nps-lens-${tag}-macos"
          cp release-assets/bin-windows/nps-lens.exe "out/nps-lens-${tag}-windows.exe"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: out/*
          generate_release_notes: true
