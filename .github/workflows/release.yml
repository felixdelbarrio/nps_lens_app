name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.9.13"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[build]"
      - name: Runtime smoke-check (PPT/export)
        run: |
          python scripts/verify_runtime.py
      - name: Prepare icons
        run: |
          python scripts/prepare_icons.py --input assets/logo.png --out-dir build/icons
      - name: Build
        run: |
          out=build/pyinstaller/linux
          mkdir -p "$out/dist" "$out/work" "$out/spec"
          pyinstaller --clean --noconfirm \
            --name nps-lens \
            --onefile \
            --icon build/icons/app.png \
            --add-data="$PWD/app:app" \
            --add-data="$PWD/assets:assets" \
            --add-data="$PWD/.streamlit:.streamlit" \
            --collect-submodules webview \
            --collect-all kaleido \
            --collect-data pptx \
            --distpath "$out/dist" \
            --workpath "$out/work" \
            --specpath "$out/spec" \
            src/nps_lens/desktop.py
      - uses: actions/upload-artifact@v4
        with:
          name: bin-linux
          path: build/pyinstaller/linux/dist/nps-lens

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.9.13"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[build]"
      - name: Runtime smoke-check (PPT/export)
        run: |
          python scripts/verify_runtime.py
      - name: Prepare icons
        run: |
          python scripts/prepare_icons.py --input assets/logo.png --out-dir build/icons
      - name: Build
        env:
          MACOS_BUNDLE_ID: com.npslens.app
          MACOS_CODESIGN_IDENTITY: ${{ secrets.MACOS_CODESIGN_IDENTITY }}
          MACOS_ENTITLEMENTS: packaging/macos/entitlements.plist
        run: |
          out=build/pyinstaller/macos
          mkdir -p "$out/dist" "$out/work" "$out/spec"
          args=(
            --clean
            --noconfirm
            --name nps-lens
            --onefile
            --icon build/icons/app.icns
            --add-data="$PWD/app:app"
            --add-data="$PWD/assets:assets"
            --add-data="$PWD/.streamlit:.streamlit"
            --collect-submodules webview
            --collect-all kaleido
            --collect-data pptx
            --distpath "$out/dist"
            --workpath "$out/work"
            --specpath "$out/spec"
            --osx-bundle-identifier "$MACOS_BUNDLE_ID"
            src/nps_lens/desktop.py
          )
          if [ -n "$MACOS_CODESIGN_IDENTITY" ]; then
            args+=(--codesign-identity "$MACOS_CODESIGN_IDENTITY")
            if [ -f "$MACOS_ENTITLEMENTS" ]; then
              args+=(--osx-entitlements-file "$MACOS_ENTITLEMENTS")
            fi
            echo "macOS signing enabled."
          else
            echo "macOS signing disabled."
          fi
          pyinstaller "${args[@]}"
      - name: Notarize macOS binary (optional)
        if: ${{ secrets.MACOS_CODESIGN_IDENTITY != '' && secrets.APPLE_ID != '' && secrets.APPLE_APP_PASSWORD != '' && secrets.APPLE_TEAM_ID != '' }}
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          zip -j nps-lens-macos.zip build/pyinstaller/macos/dist/nps-lens
          xcrun notarytool submit nps-lens-macos.zip \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait
      - uses: actions/upload-artifact@v4
        with:
          name: bin-macos
          path: build/pyinstaller/macos/dist/nps-lens

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.9.13"
      - name: Install
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[build]"
      - name: Runtime smoke-check (PPT/export)
        shell: pwsh
        run: |
          python scripts/verify_runtime.py
      - name: Prepare icons
        shell: pwsh
        run: |
          python scripts/prepare_icons.py --input assets/logo.png --out-dir build/icons
      - name: Build
        shell: pwsh
        run: |
          $out = "build/pyinstaller/windows"
          New-Item -ItemType Directory -Force -Path "$out/dist" | Out-Null
          New-Item -ItemType Directory -Force -Path "$out/work" | Out-Null
          New-Item -ItemType Directory -Force -Path "$out/spec" | Out-Null
          pyinstaller --clean --noconfirm `
            --name nps-lens `
            --onefile `
            --icon build/icons/app.ico `
            --add-data="$PWD/app;app" `
            --add-data="$PWD/assets;assets" `
            --add-data="$PWD/.streamlit;.streamlit" `
            --collect-submodules webview `
            --collect-all kaleido `
            --collect-data pptx `
            --distpath "$out/dist" `
            --workpath "$out/work" `
            --specpath "$out/spec" `
            src/nps_lens/desktop.py
      - uses: actions/upload-artifact@v4
        with:
          name: bin-windows
          path: build/pyinstaller/windows/dist/nps-lens.exe

  publish:
    needs: [build-linux, build-macos, build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Prepare asset names
        run: |
          tag="${GITHUB_REF_NAME}"
          mkdir -p out
          cp release-assets/bin-linux/nps-lens "out/nps-lens-${tag}-linux"
          cp release-assets/bin-macos/nps-lens "out/nps-lens-${tag}-macos"
          cp release-assets/bin-windows/nps-lens.exe "out/nps-lens-${tag}-windows.exe"
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: out/*
          generate_release_notes: true
