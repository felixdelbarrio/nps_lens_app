name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.9.13"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[build]"
      - name: Runtime smoke-check (PPT/export)
        run: |
          python scripts/verify_runtime.py
      - name: Prepare icons
        run: |
          python scripts/prepare_icons.py --input assets/logo.png --out-dir build/icons
      - name: Build
        run: |
          out=build/pyinstaller/linux
          mkdir -p "$out/dist" "$out/work" "$out/spec"
          pyinstaller --clean --noconfirm \
            --name nps-lens \
            --windowed \
            --icon build/icons/app.png \
            --add-data="$PWD/app:app" \
            --add-data="$PWD/assets:assets" \
            --add-data="$PWD/.streamlit:.streamlit" \
            --collect-submodules nps_lens \
            --collect-submodules webview \
            --collect-all kaleido \
            --collect-all dotenv \
            --collect-all streamlit \
            --copy-metadata python-dotenv \
            --copy-metadata streamlit \
            --collect-data pptx \
            --distpath "$out/dist" \
            --workpath "$out/work" \
            --specpath "$out/spec" \
            src/nps_lens/desktop.py
      - name: Package Linux app directory
        run: |
          tar -C build/pyinstaller/linux/dist -czf nps-lens-linux.tar.gz nps-lens
      - uses: actions/upload-artifact@v4
        with:
          name: bin-linux
          path: nps-lens-linux.tar.gz

  build-macos:
    runs-on: macos-latest
    env:
      MACOS_CODESIGN_IDENTITY: ${{ secrets.MACOS_CODESIGN_IDENTITY }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.9.13"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[build]"
      - name: Runtime smoke-check (PPT/export)
        run: |
          python scripts/verify_runtime.py
      - name: Prepare icons
        run: |
          python scripts/prepare_icons.py --input assets/logo.png --out-dir build/icons
      - name: Build
        env:
          MACOS_BUNDLE_ID: com.npslens.app
          MACOS_ENTITLEMENTS: packaging/macos/entitlements.plist
        run: |
          out=build/pyinstaller/macos
          mkdir -p "$out/dist" "$out/work" "$out/spec"
          args=(
            --clean
            --noconfirm
            --name nps-lens
            --windowed
            --icon build/icons/app.icns
            --add-data="$PWD/app:app"
            --add-data="$PWD/assets:assets"
            --add-data="$PWD/.streamlit:.streamlit"
            --collect-submodules nps_lens
            --collect-submodules webview
            --collect-all kaleido
            --collect-all dotenv
            --collect-all streamlit
            --copy-metadata python-dotenv
            --copy-metadata streamlit
            --collect-data pptx
            --distpath "$out/dist"
            --workpath "$out/work"
            --specpath "$out/spec"
            --osx-bundle-identifier "$MACOS_BUNDLE_ID"
            src/nps_lens/desktop.py
          )
          if [ -n "$MACOS_CODESIGN_IDENTITY" ]; then
            args+=(--codesign-identity "$MACOS_CODESIGN_IDENTITY")
            if [ -f "$MACOS_ENTITLEMENTS" ]; then
              args+=(--osx-entitlements-file "$MACOS_ENTITLEMENTS")
            fi
            echo "macOS signing enabled."
          else
            echo "macOS signing disabled."
          fi
          pyinstaller "${args[@]}"
      - name: Package macOS app bundle
        run: |
          rm -f nps-lens-macos.zip
          ditto -c -k --keepParent build/pyinstaller/macos/dist/nps-lens.app nps-lens-macos.zip
      - name: Notarize macOS app (optional)
        if: ${{ env.MACOS_CODESIGN_IDENTITY != '' && env.APPLE_ID != '' && env.APPLE_APP_PASSWORD != '' && env.APPLE_TEAM_ID != '' }}
        run: |
          xcrun notarytool submit nps-lens-macos.zip \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait
      - name: Staple macOS app (optional)
        if: ${{ env.MACOS_CODESIGN_IDENTITY != '' && env.APPLE_ID != '' && env.APPLE_APP_PASSWORD != '' && env.APPLE_TEAM_ID != '' }}
        run: |
          xcrun stapler staple build/pyinstaller/macos/dist/nps-lens.app
      - name: Refresh macOS app bundle package
        run: |
          rm -f nps-lens-macos.zip
          ditto -c -k --keepParent build/pyinstaller/macos/dist/nps-lens.app nps-lens-macos.zip
      - uses: actions/upload-artifact@v4
        with:
          name: bin-macos
          path: nps-lens-macos.zip

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.9.13"
      - name: Install
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[build]"
      - name: Runtime smoke-check (PPT/export)
        shell: pwsh
        run: |
          python scripts/verify_runtime.py
      - name: Prepare icons
        shell: pwsh
        run: |
          python scripts/prepare_icons.py --input assets/logo.png --out-dir build/icons
      - name: Build
        shell: pwsh
        run: |
          $out = "build/pyinstaller/windows"
          New-Item -ItemType Directory -Force -Path "$out/dist" | Out-Null
          New-Item -ItemType Directory -Force -Path "$out/work" | Out-Null
          New-Item -ItemType Directory -Force -Path "$out/spec" | Out-Null
          pyinstaller --clean --noconfirm `
            --name nps-lens `
            --windowed `
            --icon build/icons/app.ico `
            --add-data="$PWD/app;app" `
            --add-data="$PWD/assets;assets" `
            --add-data="$PWD/.streamlit;.streamlit" `
            --collect-submodules nps_lens `
            --collect-submodules webview `
            --collect-all kaleido `
            --collect-all dotenv `
            --collect-all streamlit `
            --copy-metadata python-dotenv `
            --copy-metadata streamlit `
            --collect-data pptx `
            --distpath "$out/dist" `
            --workpath "$out/work" `
            --specpath "$out/spec" `
            src/nps_lens/desktop.py
      - name: Package Windows app directory
        shell: pwsh
        run: |
          if (Test-Path "nps-lens-windows.zip") { Remove-Item "nps-lens-windows.zip" -Force }
          Compress-Archive -Path "build/pyinstaller/windows/dist/nps-lens" -DestinationPath "nps-lens-windows.zip"
      - uses: actions/upload-artifact@v4
        with:
          name: bin-windows
          path: nps-lens-windows.zip

  publish:
    needs: [build-linux, build-macos, build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Prepare asset names
        run: |
          tag="${GITHUB_REF_NAME}"
          mkdir -p out
          cp release-assets/bin-linux/nps-lens-linux.tar.gz "out/nps-lens-${tag}-linux.tar.gz"
          cp release-assets/bin-macos/nps-lens-macos.zip "out/nps-lens-${tag}-macos.zip"
          cp release-assets/bin-windows/nps-lens-windows.zip "out/nps-lens-${tag}-windows.zip"
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: out/*
          generate_release_notes: true
