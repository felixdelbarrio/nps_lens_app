name: release-windows

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.9.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.9.13"

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[build]"
          npm --prefix frontend ci

      - name: Build native Windows app
        run: make build

      - name: Archive Windows binary
        shell: pwsh
        run: |
          Compress-Archive `
            -Path build/pyinstaller/windows/dist/nps-lens.exe `
            -DestinationPath build/pyinstaller/windows/nps-lens-windows.zip `
            -Force

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: nps-lens-windows
          path: build/pyinstaller/windows/nps-lens-windows.zip

      - name: Publish Windows release asset
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: build/pyinstaller/windows/nps-lens-windows.zip
