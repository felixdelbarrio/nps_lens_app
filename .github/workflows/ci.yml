name: ci

on:
  push:
    branches: [ main, master ]
  pull_request:
  workflow_dispatch:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.9.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.9.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff (lint)
        run: |
          ruff check .

      - name: Black (check)
        run: |
          black --check .

      - name: Mypy
        run: |
          mypy .

      - name: Pytest
        run: |
          pytest
