name: release-macos

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.9.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.9.13"

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[build]"
          npm --prefix frontend ci

      - name: Build native macOS app
        run: make build

      - name: Archive macOS app
        run: |
          ditto -c -k --sequesterRsrc --keepParent \
            build/pyinstaller/macos/dist/nps-lens.app \
            build/pyinstaller/macos/nps-lens-macos.zip

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: nps-lens-macos
          path: build/pyinstaller/macos/nps-lens-macos.zip

      - name: Publish macOS release asset
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: build/pyinstaller/macos/nps-lens-macos.zip
