name: release-linux

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.9.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.9.13"

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install system libraries for pywebview packaging
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-0 libwebkit2gtk-4.1-0

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[build]"
          npm --prefix frontend ci

      - name: Build native Linux app
        run: make build

      - name: Archive Linux binary
        run: |
          tar -czf build/pyinstaller/linux/nps-lens-linux.tar.gz \
            -C build/pyinstaller/linux/dist nps-lens

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: nps-lens-linux
          path: build/pyinstaller/linux/nps-lens-linux.tar.gz

      - name: Publish Linux release asset
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: build/pyinstaller/linux/nps-lens-linux.tar.gz
