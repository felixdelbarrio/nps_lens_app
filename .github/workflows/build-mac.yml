name: build-mac

on:
  workflow_dispatch:
  # Tag releases are handled by .github/workflows/release.yml

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.9.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.9.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[build]"

      - name: Runtime smoke-check (PPT/export)
        run: |
          python scripts/verify_runtime.py

      - name: Prepare icons
        run: |
          python scripts/prepare_icons.py --input assets/logo.png --out-dir build/icons

      - name: Build (PyInstaller)
        env:
          MACOS_BUNDLE_ID: com.npslens.app
          MACOS_CODESIGN_IDENTITY: ${{ secrets.MACOS_CODESIGN_IDENTITY }}
          MACOS_ENTITLEMENTS: packaging/macos/entitlements.plist
        run: |
          out=build/pyinstaller/macos
          mkdir -p "$out/dist" "$out/work" "$out/spec"
          args=(
            --clean
            --noconfirm
            --name nps-lens
            --windowed
            --icon build/icons/app.icns
            --add-data="$PWD/app:app"
            --add-data="$PWD/assets:assets"
            --add-data="$PWD/.streamlit:.streamlit"
            --add-data="$PWD/.env.example:."
            --collect-submodules nps_lens
            --collect-submodules webview
            --collect-all kaleido
            --collect-all dotenv
            --collect-all streamlit
            --copy-metadata python-dotenv
            --copy-metadata streamlit
            --collect-data pptx
            --distpath "$out/dist"
            --workpath "$out/work"
            --specpath "$out/spec"
            --osx-bundle-identifier "$MACOS_BUNDLE_ID"
            src/nps_lens/desktop.py
          )
          if [ -n "$MACOS_CODESIGN_IDENTITY" ]; then
            args+=(--codesign-identity "$MACOS_CODESIGN_IDENTITY")
            if [ -f "$MACOS_ENTITLEMENTS" ]; then
              args+=(--osx-entitlements-file "$MACOS_ENTITLEMENTS")
            fi
            echo "macOS signing enabled."
          else
            echo "macOS signing disabled."
          fi
          pyinstaller "${args[@]}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: nps-lens-macos
          path: build/pyinstaller/macos/dist/nps-lens.app
